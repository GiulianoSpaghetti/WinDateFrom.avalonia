name: .NET AVALONIA Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: WinDateFrom.slnx
      Configuration: ${{ matrix.configuration }}
      Platform: win-arm64
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    - run: dotnet build WinDateFrom.Desktop/WinDateFrom.Desktop.csproj -c $env:Configuration -r $env:Platform
      shell: pwsh

    - name: Upload Avalonia App
      uses: actions/upload-artifact@v7
      with:
        name: App
        path: WinDateFrom.Desktop/bin/win-arm64/Release/net10.0-windows10.0.26100.0
        include-hidden-files: true
        if-no-files-found: error
